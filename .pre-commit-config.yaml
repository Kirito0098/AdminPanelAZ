# Local checks aligned with .github/workflows/ci.yml (parallel backend / frontend / shell jobs).
# Setup: pip install -r backend/requirements-dev.txt && pre-commit install

default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--config, backend/ruff.toml]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [-x, -S, warning]
        files: ^(install|start|start_node_agent|scripts/.*)\.sh$

  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend, advisory)
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)/frontend" && npm run lint || true'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: bandit
        name: bandit (advisory)
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && bandit -r backend/app backend/node_agent -ll --exclude backend/.venv,backend/app/data || true'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
