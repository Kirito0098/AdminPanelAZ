name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: lint & test (py3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install system dependencies (shellcheck)
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      # Advisory: known CVEs in pinned deps are tracked here until bumps are reviewed.
      - name: pip-audit (dependency vulnerabilities, advisory)
        continue-on-error: true
        run: pip-audit -r backend/requirements.txt

      - name: Ruff (lint)
        run: ruff check backend/

      - name: Pytest (backend tests)
        working-directory: backend
        run: pytest tests/ -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: ESLint (frontend)
        working-directory: frontend
        run: |
          npm ci
          npm run lint

      - name: Vitest (frontend)
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Shell scripts (shellcheck)
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck install.sh install-easy.sh start.sh start_node_agent.sh scripts/*.sh
          else
            echo "shellcheck not available, skipping"
          fi

      # Advisory security scan; findings are surfaced for review but do not block CI.
      - name: Bandit (security scan, advisory)
        continue-on-error: true
        run: |
          bandit -r backend/app backend/node_agent -ll \
            --exclude backend/tests,backend/.venv,backend/app/data

  install-smoke:
    name: install smoke (non-interactive + systemd)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run install smoke test
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl wget
          sudo chmod +x install.sh scripts/install-smoke-test.sh
          sudo ./scripts/install-smoke-test.sh
